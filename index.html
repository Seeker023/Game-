<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Alert</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: black;
    color: red;
    text-align: center;
    overflow: hidden;
}

/* Panic Screen */
#panic {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    animation: flicker 0.2s infinite alternate;
}

@keyframes flicker {
    from { background: #000; }
    to { background: #200000; }
}

button {
    padding: 12px 25px;
    font-size: 16px;
    border-radius: 20px;
    border: none;
    margin-top: 20px;
    background: red;
    color: white;
    cursor: pointer;
}

/* Stage 2 */
#stage2 {
    display: none;
    color: white;
    background: #111;
    position: absolute;
    width: 100%;
    height: 100%;
    padding-top: 40%;
}

/* Countdown */
#countdown {
    display: none;
    font-size: 70px;
    color: white;
    position: absolute;
    width: 100%;
    top: 40%;
}

/* Celebration */
#celebration {
    display: none;
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #ff4d6d, #ff8fa3);
    overflow: hidden;
    color: white;
}

/* Main Birthday Text */
#birthdayText {
    position: absolute;
    top: 5%;
    width: 100%;
    font-size: 24px;
    font-weight: bold;
    z-index: 10;
    text-shadow: 0 4px 10px rgba(0,0,0,0.5);
}

/* Flying Photos */
.photo {
    position: absolute;
    width: 35%;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    opacity: 0;
    transition: all 1.5s ease;
}

.show {
    opacity: 1;
}

/* Final Message */
#finalMessage {
    position: absolute;
    bottom: 5%;
    width: 100%;
    font-size: 16px;
    padding: 0 20px;
    display: none;
    z-index: 10;
}
</style>
</head>

<body>

<!-- Panic Page -->
<div id="panic">
    <h1>⚠ CRITICAL SYSTEM ALERT ⚠</h1>
    <p>High level update detected.</p>
    <button onclick="goStage2()">OPEN ALERT</button>
</div>

<!-- Stage 2 -->
<div id="stage2">
    <h2>You have moved one step closer to legendary status.</h2>
    <p>Age level increased.</p>
    <button onclick="startCountdown()">ACCEPT UPDATE</button>
</div>

<!-- Countdown -->
<div id="countdown"></div>

<!-- Celebration -->
<div id="celebration">

    <div id="birthdayText">
        🎉 Happy Birthday My Dearest Sheni Di 🎉
    </div>

    <!-- Images -->
    <img src="images/pic0.jpg" class="photo">
    <img src="images/pic1.jpg" class="photo">
    <img src="images/pic2.jpg" class="photo">
    <img src="images/pic3.jpg" class="photo">
    <img src="images/pic4.jpg" class="photo">
    <img src="images/pic5.jpg" class="photo">
    <img src="images/pic6.jpg" class="photo">
    <img src="images/pic7.jpg" class="photo">
    <img src="images/pic8.jpg" class="photo">
    <img src="images/pic9.jpg" class="photo">
    <img src="images/pic10.jpg" class="photo">

    <div id="finalMessage">
        Thank you for every memory.<br>
        Thank you for always guiding me.<br>
        I am truly grateful to have you in my life.<br><br>
        Happy Birthday ❤️
    </div>
</div>

<script>

function goStage2() {
    document.getElementById("panic").style.display = "none";
    document.getElementById("stage2").style.display = "block";
}

function startCountdown() {
    document.getElementById("stage2").style.display = "none";
    const countdown = document.getElementById("countdown");
    countdown.style.display = "block";

    let count = 3;
    countdown.innerText = count;

    let timer = setInterval(() => {
        count--;
        if(count > 0){
            countdown.innerText = count;
        } else {
            clearInterval(timer);
            countdown.style.display = "none";
            startCelebration();
        }
    }, 1000);
}

function startCelebration() {
    document.getElementById("celebration").style.display = "block";

    let photos = document.querySelectorAll(".photo");

    const positions = [
        {top: "18%", left: "5%"},
        {top: "18%", left: "55%"},
        {top: "35%", left: "10%"},
        {top: "35%", left: "60%"},
        {top: "52%", left: "5%"},
        {top: "52%", left: "55%"},
        {top: "69%", left: "15%"},
        {top: "69%", left: "60%"},
        {top: "30%", left: "35%"},
        {top: "60%", left: "35%"},
        {top: "45%", left: "35%"}
    ];

    photos.forEach((photo, i) => {
        setTimeout(() => {
            photo.classList.add("show");
            photo.style.top = positions[i % positions.length].top;
            photo.style.left = positions[i % positions.length].left;
            photo.style.transform = "rotate(" + (Math.random()*10-5) + "deg)";
        }, i * 300);
    });

    setTimeout(() => {
        document.getElementById("finalMessage").style.display = "block";
    }, 4000);
}

</script>

</body>
</html>
